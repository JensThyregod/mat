name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore backend/MatBackend.Tests/MatBackend.Tests.csproj

      - name: Build
        run: dotnet build backend/MatBackend.Tests/MatBackend.Tests.csproj --no-restore

      - name: Test
        run: dotnet test backend/MatBackend.Tests/MatBackend.Tests.csproj --no-build --verbosity normal

  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type-check & build
        run: npm run build
        working-directory: frontend

  build-keycloak-theme:
    name: Build Keycloak Theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: keycloak-theme/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci
        working-directory: keycloak-theme

      - name: Build Keycloak theme JAR
        run: npm run build-keycloak-theme
        working-directory: keycloak-theme

      - name: Upload theme JAR
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-theme-jar
          path: keycloak-theme/dist_keycloak/*.jar

  deploy:
    name: Build, Push & Deploy
    needs: [test-backend, test-frontend, build-keycloak-theme]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Keycloak theme JAR
        uses: actions/download-artifact@v4
        with:
          name: keycloak-theme-jar
          path: keycloak-theme-jar

      # ── Docker build ──────────────────────────────────────────────
      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-frontend:latest
          build-args: |
            VITE_API_BASE_URL=https://${{ secrets.API_DOMAIN }}/api
            VITE_OIDC_AUTHORITY=https://auth.mattutor.dk/realms/mat-tutor
            VITE_OIDC_CLIENT_ID=mat-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Terraform deploy ──────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init -input=false \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve -input=false \
            -var "backend_image_tag=${{ env.IMAGE_TAG }}" \
            -var "frontend_image_tag=${{ env.IMAGE_TAG }}"
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_scw_tem_domain_verification_token: ${{ secrets.SCW_TEM_DOMAIN_VERIFICATION_TOKEN }}
          TF_VAR_keycloak_admin_password: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          TF_VAR_keycloak_db_password: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      # ── Deploy Keycloak theme ────────────────────────────────────
      - name: Get Keycloak VM IP
        id: kc-ip
        working-directory: infra
        run: echo "ip=$(terraform output -raw keycloak_vm_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Deploy Keycloak theme JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          source: keycloak-theme-jar/*.jar
          target: /opt/keycloak/providers/
          strip_components: 1

      - name: Restart Keycloak to load theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          script: cd /opt/keycloak && docker compose restart keycloak
