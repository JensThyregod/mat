#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg

runcmd:
  # Install Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Create app directory
  - mkdir -p /opt/keycloak

  # Write environment file
  - |
    cat > /opt/keycloak/.env << 'ENVEOF'
    KEYCLOAK_IMAGE_TAG=${keycloak_image_tag}
    KEYCLOAK_HOSTNAME=${keycloak_hostname}
    KEYCLOAK_ADMIN_PASSWORD=${keycloak_admin_password}
    DB_HOST=${db_host}
    DB_PORT=${db_port}
    DB_NAME=${db_name}
    DB_USER=${db_user}
    DB_PASSWORD=${db_password}
    ENVEOF
    sed -i 's/^[[:space:]]*//' /opt/keycloak/.env
  - chmod 600 /opt/keycloak/.env

  # Write Caddyfile
  - |
    cat > /opt/keycloak/Caddyfile << 'CADDYEOF'
    ${keycloak_hostname} {
      reverse_proxy keycloak:8080
    }
    CADDYEOF
    sed -i 's/^[[:space:]]\{4\}//' /opt/keycloak/Caddyfile

  # Write docker-compose.yml
  - |
    cat > /opt/keycloak/docker-compose.yml << 'COMPOSEEOF'
    services:
      caddy:
        image: caddy:2-alpine
        restart: unless-stopped
        ports:
          - "80:80"
          - "443:443"
          - "443:443/udp"
        volumes:
          - ./Caddyfile:/etc/caddy/Caddyfile:ro
          - caddy_data:/data
          - caddy_config:/config
        depends_on:
          keycloak:
            condition: service_healthy

      keycloak:
        image: quay.io/keycloak/keycloak:$${KEYCLOAK_IMAGE_TAG:-26.0}
        restart: unless-stopped
        command: start
        environment:
          KC_DB: postgres
          KC_DB_URL: jdbc:postgresql://$${DB_HOST}:$${DB_PORT}/$${DB_NAME}
          KC_DB_USERNAME: $${DB_USER}
          KC_DB_PASSWORD: $${DB_PASSWORD}
          KC_HOSTNAME: $${KEYCLOAK_HOSTNAME}
          KC_PROXY_HEADERS: xforwarded
          KC_HTTP_ENABLED: "true"
          KC_HEALTH_ENABLED: "true"
          KC_METRICS_ENABLED: "true"
          KC_BOOTSTRAP_ADMIN_USERNAME: admin
          KC_BOOTSTRAP_ADMIN_PASSWORD: $${KEYCLOAK_ADMIN_PASSWORD}
        volumes:
          - ./providers:/opt/keycloak/providers:ro
        ports:
          - "127.0.0.1:8080:8080"
        healthcheck:
          test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/9000"]
          interval: 10s
          timeout: 5s
          retries: 15
          start_period: 30s

    volumes:
      caddy_data:
      caddy_config:
    COMPOSEEOF
    sed -i 's/^[[:space:]]\{4\}//' /opt/keycloak/docker-compose.yml

  # Create providers directory for Keycloak theme JAR
  - mkdir -p /opt/keycloak/providers

  # Start the stack
  - cd /opt/keycloak && docker compose up -d
