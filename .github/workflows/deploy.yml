name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore backend/MatBackend.Tests/MatBackend.Tests.csproj

      - name: Build
        run: dotnet build backend/MatBackend.Tests/MatBackend.Tests.csproj --no-restore

      - name: Test
        run: dotnet test backend/MatBackend.Tests/MatBackend.Tests.csproj --no-build --verbosity normal

  test-and-build-frontend:
    name: Frontend Lint, Build & Theme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type-check & build
        run: npm run build
        working-directory: frontend
        env:
          VITE_OIDC_AUTHORITY: https://auth.mattutor.dk/realms/mat-tutor
          VITE_OIDC_CLIENT_ID: mat-frontend
          VITE_API_BASE_URL: /api

      - name: Build Keycloak theme JAR
        run: npx keycloakify build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

      - name: Upload theme JAR
        uses: actions/upload-artifact@v4
        with:
          name: keycloak-theme-jar
          path: frontend/dist_keycloak/*.jar
          retention-days: 1

  # ── Docker builds (parallel) ─────────────────────────────────────
  build-backend-image:
    name: Build & Push Backend Image
    needs: [test-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            backend
            tasks
            curriculum
            .dockerignore

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend-image:
    name: Build & Push Frontend Image
    needs: [test-and-build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            frontend/nginx.conf
            frontend/Dockerfile.ci

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SCW_REGISTRY_ENDPOINT }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.SCW_REGISTRY_ENDPOINT }}/mat-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── Deploy ───────────────────────────────────────────────────────
  deploy:
    name: Terraform & Keycloak Deploy
    needs: [build-backend-image, build-frontend-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra

      - name: Download Keycloak theme JAR
        uses: actions/download-artifact@v4
        with:
          name: keycloak-theme-jar
          path: keycloak-theme-jar

      # ── Terraform deploy ──────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.5"

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SCW_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SCW_SECRET_KEY }}"

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var "backend_image_tag=${{ env.IMAGE_TAG }}" \
            -var "frontend_image_tag=${{ env.IMAGE_TAG }}"
        env:
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_scw_tem_domain_verification_token: ${{ secrets.SCW_TEM_DOMAIN_VERIFICATION_TOKEN }}
          TF_VAR_keycloak_admin_password: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          TF_VAR_keycloak_db_password: ${{ secrets.KEYCLOAK_DB_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      # ── Deploy Keycloak theme & realm config ───────────────────────
      - name: Get Keycloak VM IP
        id: kc-ip
        working-directory: infra
        run: echo "ip=$(terraform output -raw keycloak_vm_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Deploy Keycloak theme & realm configs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          script: mkdir -p /opt/keycloak/providers

      - name: Upload Keycloak files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          source: keycloak-theme-jar/*.jar,infra/keycloak/realm-export.json,infra/keycloak/realm-dev-export.json,infra/keycloak/docker-compose.yml,infra/keycloak/Caddyfile
          target: /tmp/keycloak-deploy/
          strip_components: 0

      - name: Move files & restart Keycloak
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          script: |
            cp /tmp/keycloak-deploy/keycloak-theme-jar/*.jar /opt/keycloak/providers/
            cp /tmp/keycloak-deploy/infra/keycloak/realm-export.json /opt/keycloak/
            cp /tmp/keycloak-deploy/infra/keycloak/realm-dev-export.json /opt/keycloak/
            cp /tmp/keycloak-deploy/infra/keycloak/docker-compose.yml /opt/keycloak/
            cp /tmp/keycloak-deploy/infra/keycloak/Caddyfile /opt/keycloak/ 2>/dev/null || true
            rm -rf /tmp/keycloak-deploy
            cd /opt/keycloak && docker compose up -d --force-recreate keycloak

      - name: Wait for Keycloak to become healthy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/keycloak
            for i in $(seq 1 40); do
              STATUS=$(docker compose ps keycloak --format json 2>/dev/null | grep -o '"Health":"[^"]*"' | cut -d'"' -f4)
              if [ "$STATUS" = "healthy" ]; then
                echo "Keycloak is healthy"
                exit 0
              fi
              echo "Waiting for Keycloak... ($i/40, status: ${STATUS:-starting})"
              sleep 5
            done
            echo "Keycloak did not become healthy in time"
            docker compose logs --tail=50 keycloak
            exit 1

      - name: Apply realm theme via Keycloak Admin API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.kc-ip.outputs.ip }}
          username: root
          key: ${{ secrets.KEYCLOAK_SSH_PRIVATE_KEY }}
          command_timeout: 2m
          script: |
            cd /opt/keycloak
            KC_URL="http://127.0.0.1:8080"
            KC_ADMIN="admin"
            KC_PASS=$(grep 'KEYCLOAK_ADMIN_PASSWORD=' .env | sed 's/.*KEYCLOAK_ADMIN_PASSWORD=//')

            TOKEN=$(curl -sf -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
              -d "client_id=admin-cli" \
              -d "username=$KC_ADMIN" \
              -d "password=$KC_PASS" \
              -d "grant_type=password" | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

            if [ -z "$TOKEN" ]; then
              echo "Failed to obtain admin token" && exit 1
            fi

            curl -sf -X PUT "$KC_URL/admin/realms/mat-tutor" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"loginTheme":"mat-tutor"}' \
              && echo "Login theme set to mat-tutor on mat-tutor realm"

            curl -sf -X PUT "$KC_URL/admin/realms/mat-tutor-dev" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"loginTheme":"mat-tutor"}' \
              && echo "Login theme set to mat-tutor on mat-tutor-dev realm"
